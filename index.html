<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Dashboard</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg1: #5ee7df;
      --bg2: #b490ca;
      --card-glass: rgba(255, 255, 255, 0.18);
      --panel: rgba(255, 255, 255, 0.88);
      --text: #1f2937;
      --muted: #6b7280;
      --blue: #3b82f6;
      --red: #ef4444;
      --orange: #f97316;
    }

    body {
      margin: 0;
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }

    .app {
      max-width: 1360px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 24px;
      text-align: center;
      color: #fff;
      font-size: 34px;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.18);
    }

    .search-box {
      display: flex;
      gap: 12px;
      max-width: 640px;
      margin: 0 auto 24px;
    }

    .search-box input {
      flex: 1;
      padding: 14px 16px;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      outline: none;
    }

    .search-box button {
      border: none;
      border-radius: 14px;
      padding: 14px 22px;
      font-size: 16px;
      background: #2563eb;
      color: #fff;
      cursor: pointer;
      transition: 0.2s;
    }

    .search-box button:hover {
      background: #1d4ed8;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(320px, 1fr));
      gap: 20px;
    }

    .card {
      background: var(--card-glass);
      backdrop-filter: blur(10px);
      border-radius: 22px;
      padding: 18px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
    }

    .card h2 {
      margin: 0 0 14px;
      color: #fff;
      font-size: 22px;
    }

    .card-content {
      background: var(--panel);
      border-radius: 18px;
      padding: 16px;
      min-height: 280px;
    }

    .hint,
    .error,
    .loading {
      color: #444;
      line-height: 1.7;
    }

    .current-city {
      font-size: 30px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .current-sub {
      color: var(--muted);
      margin-bottom: 14px;
      line-height: 1.7;
    }

    .current-main {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .current-temp {
      font-size: 46px;
      font-weight: bold;
    }

    .current-desc {
      font-size: 18px;
      margin-bottom: 8px;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(120px, 1fr));
      gap: 12px;
      margin-top: 12px;
    }

    .meta-item {
      background: rgba(255,255,255,0.72);
      border-radius: 12px;
      padding: 12px;
    }

    .meta-label {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .meta-value {
      font-size: 22px;
      font-weight: bold;
    }

    .chart-wrap {
      position: relative;
      width: 100%;
      height: 250px;
    }

    .aqi-badge {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      font-weight: bold;
      color: #fff;
      margin-bottom: 12px;
    }

    .aqi-main {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .advice-box {
      background: rgba(37, 99, 235, 0.08);
      border-left: 4px solid #2563eb;
      border-radius: 10px;
      padding: 12px 14px;
      line-height: 1.7;
      margin-top: 12px;
    }

    .map-card {
      grid-column: 1 / -1;
    }

    .map-note {
      color: #fff;
      margin-bottom: 10px;
      font-size: 14px;
      line-height: 1.6;
    }

    #satelliteMap {
      width: 100%;
      height: 520px;
      border-radius: 16px;
      overflow: hidden;
      background: #9ec9ff;
    }

    .leaflet-container {
      border-radius: 16px;
    }

    .credit {
      margin-top: 18px;
      text-align: center;
      color: rgba(255,255,255,0.92);
      font-size: 14px;
      line-height: 1.7;
    }

    .credit a {
      color: #fff;
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .map-card {
        grid-column: auto;
      }

      .meta-grid {
        grid-template-columns: 1fr;
      }

      .search-box {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>天氣資訊面板</h1>

    <div class="search-box">
      <input type="text" id="cityInput" placeholder="輸入城市，例如 Taipei、Tokyo、Paris" />
      <button id="searchBtn">查詢</button>
    </div>

    <div class="grid">
      <section class="card">
        <h2>目前天氣</h2>
        <div id="currentWeather" class="card-content">
          <p class="hint">請輸入城市名稱後查詢</p>
        </div>
      </section>

      <section class="card">
        <h2>未來 12 小時天氣</h2>
        <div class="card-content">
          <div class="chart-wrap">
            <canvas id="hourlyChart"></canvas>
          </div>
        </div>
      </section>

      <section class="card">
        <h2>未來 7 天天氣</h2>
        <div class="card-content">
          <div class="chart-wrap">
            <canvas id="weeklyChart"></canvas>
          </div>
        </div>
      </section>

      <section class="card">
        <h2>空氣品質與建議</h2>
        <div id="airQuality" class="card-content">
          <p class="hint">尚無資料</p>
        </div>
      </section>

      <section class="card map-card">
        <h2>衛星雲圖</h2>
        <div class="map-note">
          使用 NASA GIBS 衛星影像底圖。這一版不再依賴 OpenWeather API key，因此更適合直接部署在 GitHub Pages。
        </div>
        <div id="satelliteMap"></div>
      </section>
    </div>

    <div class="credit">
      Weather data by
      <a href="https://open-meteo.com/" target="_blank" rel="noopener noreferrer">Open-Meteo</a>
      · Satellite imagery by
      <a href="https://earthdata.nasa.gov/gibs" target="_blank" rel="noopener noreferrer">NASA GIBS</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    const cityInput = document.getElementById("cityInput");
    const searchBtn = document.getElementById("searchBtn");
    const currentWeather = document.getElementById("currentWeather");
    const airQuality = document.getElementById("airQuality");

    let hourlyChart = null;
    let weeklyChart = null;
    let map = null;
    let marker = null;
    let satelliteLayer = null;

    function setLoading() {
      currentWeather.innerHTML = `<p class="loading">查詢中...</p>`;
      airQuality.innerHTML = `<p class="loading">查詢中...</p>`;
    }

    function clearCharts() {
      if (hourlyChart) {
        hourlyChart.destroy();
        hourlyChart = null;
      }
      if (weeklyChart) {
        weeklyChart.destroy();
        weeklyChart = null;
      }
    }

    function showError(message) {
      currentWeather.innerHTML = `<p class="error">${message}</p>`;
      airQuality.innerHTML = `<p class="error">${message}</p>`;
      clearCharts();
    }

    async function fetchJSON(url, customMessage = "API request failed") {
      let res;
      try {
        res = await fetch(url);
      } catch (err) {
        throw new Error("無法連線到資料來源，請確認網路連線或稍後再試。");
      }

      let data;
      try {
        data = await res.json();
      } catch (err) {
        throw new Error(`資料格式錯誤：${customMessage}`);
      }

      if (!res.ok) {
        throw new Error(data.reason || data.error || customMessage);
      }
      return data;
    }

    async function geocodeCity(city) {
      const url =
        `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}` +
        `&count=1&language=zh&format=json`;

      const data = await fetchJSON(url, "地點查詢失敗");

      if (!data.results || !data.results.length) {
        throw new Error("找不到這個城市，請換一個名稱試試。");
      }
      return data.results[0];
    }

    async function getWeather(lat, lon, timezone) {
      const url =
        `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
        `&current=temperature_2m,apparent_temperature,relative_humidity_2m,weather_code,wind_speed_10m,visibility,is_day` +
        `&hourly=temperature_2m,weather_code,is_day` +
        `&daily=weather_code,temperature_2m_max,temperature_2m_min` +
        `&forecast_days=8&timezone=${encodeURIComponent(timezone || "auto")}`;

      return await fetchJSON(url, "天氣資料讀取失敗");
    }

    async function getAirQuality(lat, lon, timezone) {
      const url =
        `https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}` +
        `&current=us_aqi,pm2_5,pm10,nitrogen_dioxide,ozone` +
        `&timezone=${encodeURIComponent(timezone || "auto")}`;

      return await fetchJSON(url, "空氣品質資料讀取失敗");
    }

    function formatLocalNow(timezone) {
      return new Intl.DateTimeFormat("zh-TW", {
        timeZone: timezone,
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        weekday: "short",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      }).format(new Date());
    }

    function formatHourLocal(dateText) {
      const timePart = dateText.split("T")[1] || "00:00";
      return `${timePart.slice(0, 2)}:00`;
    }

    function formatDayLocal(dateText) {
      const d = new Date(`${dateText}T00:00:00`);
      const weekNames = ["週日", "週一", "週二", "週三", "週四", "週五", "週六"];
      const mm = String(d.getMonth() + 1).padStart(2, "0");
      const dd = String(d.getDate()).padStart(2, "0");
      return `${mm}/${dd} ${weekNames[d.getDay()]}`;
    }

    function weatherCodeToZh(code) {
      const map = {
        0: "晴朗",
        1: "大致晴朗",
        2: "局部多雲",
        3: "陰天",
        45: "霧",
        48: "霧凇",
        51: "毛毛雨",
        53: "中度毛毛雨",
        55: "強毛毛雨",
        56: "凍毛毛雨",
        57: "強凍毛毛雨",
        61: "小雨",
        63: "中雨",
        65: "大雨",
        66: "凍雨",
        67: "強凍雨",
        71: "小雪",
        73: "中雪",
        75: "大雪",
        77: "雪粒",
        80: "陣雨",
        81: "較強陣雨",
        82: "強烈陣雨",
        85: "陣雪",
        86: "強陣雪",
        95: "雷雨",
        96: "雷雨夾冰雹",
        99: "強雷雨夾冰雹"
      };
      return map[code] || "未知天氣";
    }

    function weatherCodeToEmoji(code) {
      if (code === 0) return "☀️";
      if ([1, 2].includes(code)) return "⛅";
      if (code === 3) return "☁️";
      if ([45, 48].includes(code)) return "🌫️";
      if ([51,53,55,56,57,61,63,65,66,67,80,81,82].includes(code)) return "🌧️";
      if ([71,73,75,77,85,86].includes(code)) return "❄️";
      if ([95,96,99].includes(code)) return "⛈️";
      return "🌤️";
    }

    function renderCurrent(location, weather) {
      const c = weather.current;
      const localNow = formatLocalNow(weather.timezone);

      currentWeather.innerHTML = `
        <div class="current-city">${location.name}${location.country ? `, ${location.country}` : ""}</div>
        <div class="current-sub">
          當地時間：${localNow}<br>
          座標：${location.latitude.toFixed(2)}, ${location.longitude.toFixed(2)}
        </div>

        <div class="current-main">
          <div style="font-size:42px;">${weatherCodeToEmoji(c.weather_code)}</div>
          <div class="current-temp">${Math.round(c.temperature_2m)}°C</div>
        </div>

        <div class="current-desc">${weatherCodeToZh(c.weather_code)}</div>

        <div class="meta-grid">
          <div class="meta-item">
            <div class="meta-label">體感溫度</div>
            <div class="meta-value">${Math.round(c.apparent_temperature)}°</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">濕度</div>
            <div class="meta-value">${Math.round(c.relative_humidity_2m)}%</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">風速</div>
            <div class="meta-value">${Math.round(c.wind_speed_10m)}</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">能見度</div>
            <div class="meta-value">${(c.visibility / 1000).toFixed(1)} km</div>
          </div>
        </div>
      `;
    }

    const dayNightPlugin = {
      id: "dayNightPlugin",
      beforeDraw(chart, args, options) {
        const { ctx, chartArea, scales } = chart;
        if (!chartArea || !options || !options.isDay) return;

        const x = scales.x;
        const isDay = options.isDay;

        ctx.save();
        for (let i = 0; i < isDay.length; i++) {
          const xCenter = x.getPixelForValue(i);
          const prev = i === 0 ? chartArea.left : (x.getPixelForValue(i - 1) + xCenter) / 2;
          const next = i === isDay.length - 1 ? chartArea.right : (xCenter + x.getPixelForValue(i + 1)) / 2;
          ctx.fillStyle = isDay[i] ? "rgba(255, 244, 200, 0.42)" : "rgba(25, 40, 75, 0.18)";
          ctx.fillRect(prev, chartArea.top, next - prev, chartArea.bottom - chartArea.top);
        }
        ctx.restore();
      }
    };

    const weekIconsPlugin = {
      id: "weekIconsPlugin",
      afterDatasetsDraw(chart, args, options) {
        const { ctx, chartArea, scales } = chart;
        if (!chartArea || !options || !options.icons) return;

        ctx.save();
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.font = "22px Arial";

        options.icons.forEach((icon, i) => {
          const x = scales.x.getPixelForValue(i);
          ctx.fillText(icon, x, chartArea.top + 14);
        });

        ctx.restore();
      }
    };

    function renderHourlyChart(weather) {
      clearHourlyChartOnly();

      const currentTime = weather.current.time;
      const startIndex = weather.hourly.time.findIndex(t => t === currentTime);
      const idx = startIndex >= 0 ? startIndex : 0;

      const labels = weather.hourly.time.slice(idx, idx + 12).map(formatHourLocal);
      const temps = weather.hourly.temperature_2m.slice(idx, idx + 12);
      const isDay = weather.hourly.is_day.slice(idx, idx + 12);
      const codes = weather.hourly.weather_code.slice(idx, idx + 12);

      const ctx = document.getElementById("hourlyChart").getContext("2d");

      hourlyChart = new Chart(ctx, {
        type: "line",
        data: {
          labels,
          datasets: [{
            label: "溫度 (°C)",
            data: temps,
            tension: 0.35,
            borderWidth: 3,
            pointRadius: 4,
            pointHoverRadius: 6,
            borderColor: "#f97316",
            backgroundColor: "#f97316",
            fill: false
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: true },
            tooltip: {
              callbacks: {
                afterLabel: (context) => weatherCodeToZh(codes[context.dataIndex])
              }
            },
            dayNightPlugin: { isDay }
          },
          scales: {
            y: {
              ticks: {
                callback: v => `${v}°`
              }
            },
            x: {
              ticks: {
                maxRotation: 0,
                minRotation: 0
              }
            }
          }
        },
        plugins: [dayNightPlugin]
      });
    }

    function renderWeeklyChart(weather) {
      clearWeeklyChartOnly();

      const labels = weather.daily.time.slice(1, 8).map(formatDayLocal);
      const maxTemps = weather.daily.temperature_2m_max.slice(1, 8);
      const minTemps = weather.daily.temperature_2m_min.slice(1, 8);
      const codes = weather.daily.weather_code.slice(1, 8);
      const icons = codes.map(weatherCodeToEmoji);

      const ctx = document.getElementById("weeklyChart").getContext("2d");

      weeklyChart = new Chart(ctx, {
        type: "line",
        data: {
          labels,
          datasets: [
            {
              label: "最高溫 (°C)",
              data: maxTemps,
              tension: 0.3,
              borderWidth: 3,
              pointRadius: 4,
              borderColor: "#ef4444",
              backgroundColor: "#ef4444"
            },
            {
              label: "最低溫 (°C)",
              data: minTemps,
              tension: 0.3,
              borderWidth: 3,
              pointRadius: 4,
              borderColor: "#3b82f6",
              backgroundColor: "#3b82f6"
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          layout: {
            padding: { top: 28 }
          },
          plugins: {
            legend: { display: true },
            tooltip: {
              callbacks: {
                afterLabel: (context) => weatherCodeToZh(codes[context.dataIndex])
              }
            },
            weekIconsPlugin: { icons }
          },
          scales: {
            y: {
              ticks: {
                callback: v => `${v}°`
              }
            },
            x: {
              ticks: {
                maxRotation: 0,
                minRotation: 0
              }
            }
          }
        },
        plugins: [weekIconsPlugin]
      });
    }

    function clearHourlyChartOnly() {
      if (hourlyChart) {
        hourlyChart.destroy();
        hourlyChart = null;
      }
    }

    function clearWeeklyChartOnly() {
      if (weeklyChart) {
        weeklyChart.destroy();
        weeklyChart = null;
      }
    }

    function getAqiInfo(aqi) {
      if (aqi <= 50) return { text: "良好", color: "#22c55e" };
      if (aqi <= 100) return { text: "普通", color: "#eab308" };
      if (aqi <= 150) return { text: "對敏感族群不佳", color: "#f97316" };
      if (aqi <= 200) return { text: "不健康", color: "#ef4444" };
      if (aqi <= 300) return { text: "非常不健康", color: "#7c3aed" };
      return { text: "危險", color: "#7f1d1d" };
    }

    function getExerciseAdvice(aqi, visibilityKm) {
      if (aqi <= 50 && visibilityKm >= 10) {
        return "空氣與能見度都不錯，適合一般戶外運動。";
      }
      if (aqi <= 100 && visibilityKm >= 8) {
        return "可進行一般戶外活動，但長時間高強度運動可適度減量。";
      }
      if (aqi <= 150) {
        return "敏感族群建議減少戶外運動，一般民眾可做輕度活動。";
      }
      return "建議避免劇烈戶外運動，改為室內活動較合適。";
    }

    function renderAirQuality(weather, air) {
      const c = air.current;
      const aqi = Math.round(c.us_aqi ?? 0);
      const info = getAqiInfo(aqi);
      const visibilityKm = (weather.current.visibility / 1000).toFixed(1);
      const advice = getExerciseAdvice(aqi, Number(visibilityKm));

      airQuality.innerHTML = `
        <div class="aqi-badge" style="background:${info.color};">空氣品質：${info.text}</div>

        <div class="aqi-main">AQI：${aqi}</div>

        <div class="meta-grid">
          <div class="meta-item">
            <div class="meta-label">PM2.5</div>
            <div class="meta-value">${Math.round(c.pm2_5 ?? 0)}</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">PM10</div>
            <div class="meta-value">${Math.round(c.pm10 ?? 0)}</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">NO₂</div>
            <div class="meta-value">${Math.round(c.nitrogen_dioxide ?? 0)}</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">O₃</div>
            <div class="meta-value">${Math.round(c.ozone ?? 0)}</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">能見度</div>
            <div class="meta-value">${visibilityKm} km</div>
          </div>
        </div>

        <div class="advice-box">
          <strong>運動建議：</strong><br>
          ${advice}
        </div>
      `;
    }

    function getGibsDate() {
      const d = new Date();
      d.setUTCDate(d.getUTCDate() - 1);
      return d.toISOString().slice(0, 10);
    }

    function renderSatelliteMap(lat, lon, cityName) {
      const gibsDate = getGibsDate();
      const gibsUrl =
        `https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/` +
        `MODIS_Terra_CorrectedReflectance_TrueColor/default/${gibsDate}/` +
        `GoogleMapsCompatible_Level9/{z}/{y}/{x}.jpg`;

      if (!map) {
        map = L.map("satelliteMap", {
          zoomControl: true
        }).setView([lat, lon], 5);

        satelliteLayer = L.tileLayer(gibsUrl, {
          attribution: "&copy; NASA GIBS",
          maxZoom: 9,
          tileSize: 256,
          noWrap: true
        }).addTo(map);

        marker = L.marker([lat, lon]).addTo(map).bindPopup(cityName).openPopup();
      } else {
        map.setView([lat, lon], 5);

        if (marker) {
          marker.setLatLng([lat, lon]).bindPopup(cityName).openPopup();
        }

        if (satelliteLayer) {
          map.removeLayer(satelliteLayer);
        }

        satelliteLayer = L.tileLayer(gibsUrl, {
          attribution: "&copy; NASA GIBS",
          maxZoom: 9,
          tileSize: 256,
          noWrap: true
        }).addTo(map);
      }
    }

    async function searchWeather(city) {
      const query = city.trim();
      if (!query) {
        showError("請先輸入城市名稱。");
        return;
      }

      setLoading();

      try {
        const location = await geocodeCity(query);
        const lat = location.latitude;
        const lon = location.longitude;
        const timezone = location.timezone || "auto";

        const [weather, air] = await Promise.all([
          getWeather(lat, lon, timezone),
          getAirQuality(lat, lon, timezone)
        ]);

        renderCurrent(location, weather);
        renderHourlyChart(weather);
        renderWeeklyChart(weather);
        renderAirQuality(weather, air);
        renderSatelliteMap(lat, lon, `${location.name}${location.country ? `, ${location.country}` : ""}`);
      } catch (err) {
        console.error(err);
        showError(err.message || "資料讀取失敗。");
      }
    }

    searchBtn.addEventListener("click", () => {
      searchWeather(cityInput.value);
    });

    cityInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        searchWeather(cityInput.value);
      }
    });

    searchWeather("Taipei");
  </script>
</body>
</html>
